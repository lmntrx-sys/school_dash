<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Academic Dashboard</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <h1>Academic Dashboard</h1>
        <div id="clock"></div>
    </header>

    <section id="data-entry">
        <h2>Student Data Entry</h2>
        <form id="student-form">
            <label for="name">Full Name:</label>
            <input type="text" id="name" required>

            <label for="regNo">Registration Number:</label>
            <input type="text" id="regNo" required>

            <label for="cat">CAT Marks (0-30):</label>
            <input type="number" id="cat" min="0" max="30" required>

            <label for="exam">Exam Marks (0-70):</label>
            <input type="number" id="exam" min="0" max="70" required>

            <button type="submit">Add Student</button>
        </form>
    </section>

    <section id="results">
        <h2>Results Table</h2>
        <table id="results-table">
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Registration Number</th>
                    <th>Total Marks</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>

    <section id="dashboard">
        <h2>Dashboard Statistics</h2>
        <p id="average">Class Average: 0</p>
        <p id="passes-fails">Passes: 0 | Fails: 0</p>
    </section>

    <script src="index.js"></script>
</body>
</html>
